# Server Port Configuration
server.port=8090

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:jwtdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console Settings
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate DDL Auto-Generation
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Logging levels (DEBUG for Security troubleshooting)
logging.level.org.springframework.security=DEBUG
logging.level.com.example.jwt=DEBUG

# JWT Specific Settings
# Note: Secret key must be at least 256 bits (32 bytes/characters) for HS256 algorithm
jwt.secret=ThisIsMySecretKeyForJwtAuthentication1234567890ThisIsMySecretKeyForJwtAuthentication1234567890
jwt.expiration=3600000
